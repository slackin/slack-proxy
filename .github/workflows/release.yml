name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Strip binary
        run: strip build/urt-proxy

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p "urt-proxy-${VERSION}"
          cp build/urt-proxy "urt-proxy-${VERSION}/"
          cp urt-proxy.conf.example "urt-proxy-${VERSION}/"
          cp README.md LICENSE "urt-proxy-${VERSION}/"
          tar czf "urt-proxy-${VERSION}-linux-amd64.tar.gz" "urt-proxy-${VERSION}/"
          sha256sum "urt-proxy-${VERSION}-linux-amd64.tar.gz" > "urt-proxy-${VERSION}-linux-amd64.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            urt-proxy-*.tar.gz
            urt-proxy-*.sha256
